name: desktop-release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v1.15.0'
        required: true
        type: string

jobs:
  build-desktop:
    name: Build ${{ matrix.assetPlatform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - platform: windows-latest
            assetPlatform: ja-windows-x64-portable
            args: '--no-bundle'
            rustTargets: 'x86_64-pc-windows-msvc'
            uploadPlainBinary: true
          - platform: macos-latest
            assetPlatform: ja-macos-arm64
            args: '--target aarch64-apple-darwin --bundles dmg'
            rustTargets: 'aarch64-apple-darwin'
            uploadPlainBinary: false
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTargets }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload Tauri release assets
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_HOME: ${{ runner.temp }}/cargo-home
          RUSTFLAGS: >-
            --remap-path-prefix=${{ github.workspace }}=.
            --remap-path-prefix=${{ runner.temp }}=.
        with:
          tauriScript: npm run tauri
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: CSP Paperback ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseBody: |
            CSP Paperback 最新デスクトップバイナリ配布。
            Version: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: false
          uploadPlainBinary: ${{ matrix.uploadPlainBinary }}
          assetNamePattern: CSP-Paperback_[version]_${{ matrix.assetPlatform }}[ext]
          args: ${{ matrix.args }}

      - name: Audit release artifacts for path leaks
        run: npm run audit:artifacts -- dist --tauri

  publish-desktop-release:
    name: Publish desktop release
    needs: build-desktop
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Verify release asset set
        shell: bash
        run: |
          set -euo pipefail
          version="${TAG_NAME#v}"
          expected_windows="CSP-Paperback_${version}_ja-windows-x64-portable.exe"
          expected_macos="CSP-Paperback_${version}_ja-macos-arm64.dmg"
          mapfile -t assets < <(gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' | sort)
          printf '%s\n' "${assets[@]}"
          if [[ "${#assets[@]}" -ne 2 ]]; then
            echo "Expected exactly 2 release assets, found ${#assets[@]}." >&2
            exit 1
          fi
          if [[ "${assets[0]}" != "$expected_macos" || "${assets[1]}" != "$expected_windows" ]]; then
            echo "Unexpected release assets. Expected:" >&2
            printf '%s\n' "$expected_macos" "$expected_windows" >&2
            exit 1
          fi

      - name: Publish audited release
        run: gh release edit "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --draft=false --prerelease=false

      - name: Delete older release entries
        shell: bash
        run: |
          set -euo pipefail
          gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName --jq '.[].tagName' |
          while IFS= read -r tag; do
            if [[ -z "$tag" || "$tag" == "$TAG_NAME" ]]; then
              continue
            fi
            echo "Deleting old release entry: $tag"
            gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --yes
          done
