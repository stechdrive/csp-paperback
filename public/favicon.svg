<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#909aaa;stop-opacity:1"/>
      <stop offset="35%"  style="stop-color:#5a6270;stop-opacity:1"/>
      <stop offset="65%"  style="stop-color:#6e7a8a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3a404a;stop-opacity:1"/>
    </linearGradient>

    <filter id="bevel" x="-20%" y="-20%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feOffset in="blur" dx="5" dy="5" result="shadow"/>
      <feSpecularLighting in="blur" surfaceScale="5" specularConstant="0.9"
          specularExponent="20" lighting-color="#ffffff" result="spec">
        <fePointLight x="-5000" y="-10000" z="20000"/>
      </feSpecularLighting>
      <feComposite in="spec" in2="SourceAlpha" operator="in" result="spec"/>
      <feComposite in="SourceGraphic" in2="spec" operator="arithmetic"
          k1="0" k2="1" k3="1" k4="0" result="lit"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="lit"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="500" height="500" rx="55" fill="#1e1e2e"/>

  <!-- レイアウト用紙フレーム -->
  <rect x="18" y="18" width="464" height="464" rx="8"
        fill="none" stroke="#45475a" stroke-width="3"/>
  <rect x="42" y="42" width="416" height="416"
        fill="none" stroke="#585b70" stroke-width="7"/>
  <rect x="90" y="90" width="320" height="320"
        fill="none" stroke="#6c7086" stroke-width="4"/>

  <g filter="url(#bevel)">
    <!-- P: 元のパスをそのまま使用 -->
    <path d="M 100,140 L 100,400 L 135,400 L 135,285 L 200,285
             C 270,285 295,250 295,212 C 295,175 270,140 200,140 Z
             M 135,175 L 200,175 C 245,175 260,190 260,212
             C 260,235 245,250 200,250 L 135,250 Z"
          fill="url(#metalGrad)" stroke="#111" stroke-width="1"/>

    <!-- b: ボウルを円形に近く修正（縦長オーバル→ほぼ正円） -->
    <!-- outer: 上端y=140、ボウル上端y=255、右端x=410、ボウル下端y=388 -->
    <path d="M 285,140 L 285,372
             C 285,385 296,397 316,397
             C 372,397 412,362 412,320
             C 412,278 372,255 316,255
             C 301,255 290,260 285,270
             L 285,140 Z"
          fill="url(#metalGrad)" stroke="#111" stroke-width="1"/>

    <!-- inner counter: 元の90px幅に対し高さも90px程度に -->
    <path d="M 322,278 C 357,278 378,296 378,320
             C 378,344 357,362 322,362
             C 302,362 285,350 285,338
             L 285,302
             C 285,290 302,278 322,278 Z"
          fill="url(#metalGrad)" stroke="#111" stroke-width="1"/>
  </g>
</svg>
